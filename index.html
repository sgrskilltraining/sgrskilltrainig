    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f7fa; font-family: 'Segoe UI', sans-serif; }
        header { background: linear-gradient(135deg, #004d40, #00695c); color: white; text-align: center; padding: 1rem; }
        .contact-bar { background: rgba(0,0,0,0.3); padding: 0.6rem; display: flex; justify-content: center; gap: 1.5rem; flex-wrap: wrap; border-radius: 50px; margin: 0.8rem 0; }
        .top-buttons { display: flex; justify-content: center; gap: 1rem; }
        .whatsapp-btn, .admin-btn, .verify-btn { padding: 0.4rem 1rem; border-radius: 40px; text-decoration: none; font-weight: bold; }
        .whatsapp-btn { background: #25D366; color: white; }
        .admin-btn { background: white; color: #00695c; }
        .verify-btn { background: #ff9800; color: white; }
        .sliders-grid { max-width: 1400px; margin: 2rem auto; padding: 0 1rem; display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
        .slider-card { background: white; border-radius: 16px; padding: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .slider-card h3 { color: #004d40; text-align: center; margin-bottom: 0.8rem; }
        .slider-container { position: relative; overflow: hidden; border-radius: 12px; height: 200px; }
        .slider-track { display: flex; transition: transform 0.5s ease; height: 100%; }
        .slide { min-width: 100%; height: 100%; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        .slider-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: white; border: none; padding: 6px 10px; cursor: pointer; border-radius: 50%; }
        .slider-btn.prev { left: 5px; }
        .slider-btn.next { right: 5px; }
        .dots { text-align: center; margin-top: 0.5rem; }
        .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #ccc; margin: 0 3px; cursor: pointer; }
        .dot.active { background: #00695c; width: 16px; border-radius: 10px; }
        .courses { max-width: 1200px; margin: 3rem auto; padding: 0 1rem; }
        .course-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; }
        .course-card { background: white; border-radius: 16px; overflow: hidden; text-align: center; padding-bottom: 1rem; }
        .course-card img { width: 100%; height: 160px; object-fit: cover; }
        .fee { background: #e0f2f1; color: #004d40; padding: 0.2rem 0.8rem; border-radius: 20px; display: inline-block; margin: 0.5rem 0; }
        .enquiry-section { max-width: 500px; margin: 3rem auto; background: white; padding: 1.5rem; border-radius: 24px; }
        input, select, textarea, button { width: 100%; padding: 10px; margin: 6px 0; border: 1px solid #ddd; border-radius: 12px; }
        button { background: #00695c; color: white; font-weight: bold; cursor: pointer; }
        footer { background: #004d40; color: white; padding: 1.5rem; text-align: center; margin-top: 2rem; }
        @media (max-width: 1024px) { .sliders-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 640px) { .sliders-grid { grid-template-columns: 1fr; } }
    </style>

    <script>
        const slidersCount = 4;
        let currentIndex = [0, 0, 0, 0];
        let totalSlides = [4, 4, 4, 4];
        let autoPlayInterval;

        function createDots() {
            for(let i = 0; i < slidersCount; i++) {
                const dotsContainer = document.getElementById(`dots${i}`);
                if(!dotsContainer) continue;
                dotsContainer.innerHTML = '';
                for(let j = 0; j < totalSlides[i]; j++) {
                    const dot = document.createElement('span');
                    dot.classList.add('dot');
                    dot.onclick = () => goToSlide(i, j);
                    dotsContainer.appendChild(dot);
                }
                updateDots(i);
            }
        }

        function updateDots(sliderId) {
            const dotsContainer = document.getElementById(`dots${sliderId}`);
            if(!dotsContainer) return;
            const dots = dotsContainer.querySelectorAll('.dot');
            dots.forEach((dot, idx) => {
                if(idx === currentIndex[sliderId]) dot.classList.add('active');
                else dot.classList.remove('active');
            });
        }

        function updateSlider(sliderId) {
            const track = document.getElementById(`track${sliderId}`);
            if(track) track.style.transform = `translateX(-${currentIndex[sliderId] * 100}%)`;
            updateDots(sliderId);
        }

        function slideChange(sliderId, direction) {
            let newIndex = currentIndex[sliderId] + direction;
            if(newIndex < 0) newIndex = totalSlides[sliderId] - 1;
            if(newIndex >= totalSlides[sliderId]) newIndex = 0;
            currentIndex[sliderId] = newIndex;
            updateSlider(sliderId);
            resetAutoPlay();
        }

        function goToSlide(sliderId, slideIndex) {
            currentIndex[sliderId] = slideIndex;
            updateSlider(sliderId);
            resetAutoPlay();
        }

        function startAutoPlay() {
            autoPlayInterval = setInterval(() => {
                for(let i = 0; i < slidersCount; i++) {
                    let newIndex = currentIndex[i] + 1;
                    if(newIndex >= totalSlides[i]) newIndex = 0;
                    currentIndex[i] = newIndex;
                    updateSlider(i);
                }
            }, 4000);
        }

        function resetAutoPlay() {
            clearInterval(autoPlayInterval);
            startAutoPlay();
        }

        createDots();
        startAutoPlay();
    </script>
</body>
